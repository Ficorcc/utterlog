# ============================================================
# Utterlog Bun — external PostgreSQL overlay
# ------------------------------------------------------------
# Disables bundled postgres and lets the Bun app use DB_HOST from .env.
# External PostgreSQL overlay — no bundled postgres service.
# ============================================================

services:
  postgres:
    profiles: ["disabled"]

  app:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: !reset {}
