name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  app:
    name: Bun app + frontend builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install Bun app deps
        run: bun install --frozen-lockfile

      - name: Type check Bun server
        run: bun run server:check

      - name: Install admin deps
        working-directory: app/admin
        run: bun install

      - name: Build admin SPA
        working-directory: app/admin
        run: bun run build

      - name: Sync theme styles
        working-directory: app/web
        run: bun run sync:themes

      - name: Build blog client bundle
        run: bun run build:blog-client
        env:
          NEXT_PUBLIC_API_URL: /api/v1
