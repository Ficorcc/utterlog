# ============================================================
# Utterlog — Bun production compose (pull-only)
# ------------------------------------------------------------
# Published installer target:
#   app + postgres
#
# Runtime data:
#   ./pgdata/   — PostgreSQL data
#   ./uploads/  — user-uploaded media
#   ./content/  — runtime themes/plugins
#   ./.env      — configuration/secrets
# ============================================================

services:
  postgres:
    image: ${POSTGRES_IMAGE:-utterlog-postgres:19beta1-pgvector}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-utterlog}
      POSTGRES_USER: ${DB_USER:-utterlog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Run install.sh or set DB_PASSWORD in .env}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - ./pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-utterlog} -d ${DB_NAME:-utterlog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${UTTERLOG_IMAGE_PREFIX:-ghcr.io/utterlog}/utterlog-app:${UTTERLOG_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UTTERLOG_PORT:-9260}:8080"
    environment:
      - PORT=8080
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-utterlog}
      - DB_USER=${DB_USER:-utterlog}
      - DB_PASSWORD=${DB_PASSWORD:?Run install.sh or set DB_PASSWORD in .env}
      - DB_PREFIX=${DB_PREFIX:-ul_}
      - JWT_SECRET=${JWT_SECRET:?Run install.sh or set JWT_SECRET in .env}
      - APP_URL=${APP_URL:-http://127.0.0.1:${UTTERLOG_PORT:-9260}}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_REGION=${S3_REGION:-auto}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - WEB_RENDERER=bun
      - NEXT_PUBLIC_API_URL=/api/v1
      - INTERNAL_API_URL=http://127.0.0.1:8080/api/v1
      - UPLOAD_DIR=uploads
    volumes:
      - ./uploads:/app/uploads
      - ./content:/app/content
      - ./.env:/app/.env:rw
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/hostname:/host/etc/hostname:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
