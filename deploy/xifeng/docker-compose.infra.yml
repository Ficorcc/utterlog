# PostgreSQL 19beta1 + pgvector（Bun 版不需要 Redis）
services:
  postgres:
    container_name: utterlog-postgres-1
    image: utterlog-postgres:19beta1-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_ROOT_DB:-utterlog}
      POSTGRES_USER: ${POSTGRES_ROOT_USER:-utterlog}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:?set POSTGRES_ROOT_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - ./pgdata:/var/lib/postgresql
    networks:
      - shared
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ROOT_USER:-utterlog} -d ${POSTGRES_ROOT_DB:-utterlog}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

networks:
  shared:
    external: true
    name: utterlog_default
