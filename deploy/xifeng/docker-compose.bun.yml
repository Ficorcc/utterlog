# Utterlog Bun — xifeng.net 单容器（外部 postgres）
# 镜像由本地 scripts/deploy-xifeng.sh 构建并 docker load 到服务器，不在服务器编译。
services:
  app:
    image: utterlog-app:local
    container_name: utterlog-xifeng-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${UTTERLOG_PORT:-9261}:8080"
    environment:
      - PORT=8080
      - DB_HOST=${DB_HOST:-utterlog-postgres-1}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PREFIX=${DB_PREFIX:-ul_}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - WEB_RENDERER=bun
      - NEXT_PUBLIC_API_URL=/api/v1
      - INTERNAL_API_URL=http://127.0.0.1:8080/api/v1
      - UPLOAD_DIR=uploads
      - UTTERLOG_INSTALL_DIR=${UTTERLOG_INSTALL_DIR:-/opt/utterlog-xifeng}
    volumes:
      - ./uploads:/app/uploads
      - ./content:/app/content
      - ./.env:/app/.env:rw
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/hostname:/host/etc/hostname:ro
    networks:
      - shared
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  shared:
    external: true
    name: utterlog_default
